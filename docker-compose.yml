version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: financial_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-admin}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-admin123}
      POSTGRES_DB: ${POSTGRES_DB:-financial_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d financial_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    image: node:20
    container_name: financial_app
    restart: always
    ports:
      - "3000:3000"
    volumes:
      - .:/app
    working_dir: /app
    user: "1000:1000"
    command: sh -c "npm install && npx prisma generate && npm run dev"
    environment:
      DATABASE_URL: "postgresql://admin:admin123@postgres:5432/financial_db?schema=public"
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET}
      NEXTAUTH_URL: ${NEXTAUTH_URL}
      WATCHPACK_POLLING: "true"
      CHOKIDAR_USEPOLLING: "true"
    depends_on:
      postgres:
        condition: service_healthy
volumes:
  postgres_data:
